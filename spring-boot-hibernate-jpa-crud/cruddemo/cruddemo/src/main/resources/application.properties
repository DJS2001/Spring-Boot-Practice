spring.application.name=cruddemo
spring.datasource.url=jdbc:mysql://localhost:3306/student_tracker
spring.datasource.username=springstudent
spring.datasource.password=springstudent

#Quitar el bannner de Spring
spring.main.banner-mode=off

#Reducir el nivel del loggin
loggin.level.root=warn

# Añadir logging configs para mostrar las sentencias de SQL
loggin.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# Configurar JPA/Hibernate para crear automaticamente las tablas
# La configuracion "update" mantendra los datos existentes en la tabla
spring.jpa.hibernate.ddl-auto=update